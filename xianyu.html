<!DOCTYPE html><html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闲鱼利润计算器</title><style>
body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    height:45px;
    margin-bottom:15px;
    font-size:18px;
    padding-left:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    height:50px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#1677ff;
    color:white;
}

.result{
    margin-top:20px;
    font-size:22px;
    line-height:40px;
}
</style></head><body><div class="box"><h2>闲鱼利润计算器</h2><input type="number" id="cost" placeholder="商品成本"><input type="number" id="shipping" placeholder="运费"><input type="number" id="price" placeholder="售价"><button onclick="calc()">计算利润</button>

<div class="result">
<p>利润：<span id="profit">0</span> 元</p><p>利润率：<span id="rate">0</span>%</p>
</div></div><script>

function calc(){

let cost =
parseFloat(document.getElementById("cost").value) || 0;

let shipping =
parseFloat(document.getElementById("shipping").value) || 0;

let price =
parseFloat(document.getElementById("price").value) || 0;

let profit =
price - cost - shipping;

let rate = 0;

if(price>0){
rate =
(profit / price * 100).toFixed(2);
}

document.getElementById("profit").innerHTML =
profit.toFixed(2);

document.getElementById("rate").innerHTML =
rate;

}

</script></body>
</html
